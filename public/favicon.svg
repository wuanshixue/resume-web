<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="38" fill="#F5F0E1"/>
  <rect y="38" width="100" height="30" fill="#D8D8D8"/>
  <rect y="68" width="100" height="32" fill="#B8C0C8"/>

  <!-- Apple shadow -->
  <ellipse cx="50" cy="80" rx="28" ry="6" fill="#9AA4AE" opacity="0.5"/>

  <!-- Apple body -->
  <ellipse cx="50" cy="55" rx="30" ry="28" fill="#7DBE5A"/>

  <!-- Apple highlight left -->
  <ellipse cx="40" cy="48" rx="10" ry="14" fill="#A8D88A" opacity="0.6"/>

  <!-- Apple highlight spot -->
  <ellipse cx="37" cy="43" rx="4" ry="5" fill="#C8E8B0" opacity="0.5"/>

  <!-- Apple bottom indent -->
  <ellipse cx="50" cy="81" rx="6" ry="3" fill="#6AAE48"/>

  <!-- Apple top indent -->
  <ellipse cx="50" cy="30" rx="5" ry="3" fill="#6AAE48"/>

  <!-- Stem -->
  <rect x="48" y="20" width="4" height="12" rx="1.5" fill="#5C3A1E"/>

  <!-- Pixel texture dots for retro feel -->
  <circle cx="35" cy="50" r="1.5" fill="#90CC6E" opacity="0.4"/>
  <circle cx="60" cy="55" r="1.5" fill="#6AAE48" opacity="0.4"/>
  <circle cx="45" cy="65" r="1.5" fill="#6AAE48" opacity="0.4"/>
  <circle cx="55" cy="45" r="1.5" fill="#90CC6E" opacity="0.4"/>
  <circle cx="42" cy="58" r="1" fill="#90CC6E" opacity="0.3"/>
  <circle cx="58" cy="62" r="1" fill="#6AAE48" opacity="0.3"/>
</svg>